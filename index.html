<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script>
      (function () {
        var path = window.location.pathname || "/";
        var isAdmin =
          window.location.hostname.indexOf("admin") !== -1 ||
          path.indexOf("/admin") === 0 ||
          path.indexOf("/auth/login") === 0;
        if (isAdmin) {
          // Apply admin isolation before any CSS loads.
          document.documentElement.classList.add("campx-admin");
          return;
        }
        // Only load prototype shell CSS for the student-facing app.
        document.write('<link rel="stylesheet" href="/campx-speed-dial.css?v=4">');
        document.write('<link rel="stylesheet" href="/campx-web-layout.css?v=4">');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
