<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampX Login</title>
  <meta http-equiv="refresh" content="0; url=/onboarding#login">
</head>
<body>
  <script>
    (function () {
      const host = (window.location.hostname || "").toLowerCase();
      const qp = new URLSearchParams(window.location.search);
      const existingNext = qp.get("next");
      const fallbackNext =
        host === "admin.campx.social" || host.startsWith("admin.")
          ? "/founder-dashboard"
          : host === "college.campx.social" || host.startsWith("college.")
            ? "/ambassador-dashboard"
            : "/feed";
      const next = existingNext || fallbackNext;
      window.location.replace("/onboarding?next=" + encodeURIComponent(next) + "#login");
    })();
  </script>
</body>
</html>
