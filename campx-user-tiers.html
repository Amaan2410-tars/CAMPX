<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script type="module" src="/src/entries/session-gate.ts"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampX - Choose Plan</title>
<style>body{margin:0;background:#0a0b10;color:#eef0ff;font-family:Inter,Arial,sans-serif}.wrap{max-width:1024px;margin:0 auto;padding:28px 18px}h1{margin:0 0 8px}.sub{margin:0 0 16px;color:rgba(238,240,255,0.72);line-height:1.6}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.box{background:#121524;border:1px solid #262a43;border-radius:12px;padding:14px;margin:10px 0}.plan{padding:16px;border-radius:14px;background:#111428;border:1px solid rgba(255,255,255,0.12);display:flex;flex-direction:column;gap:10px}.plan h2{margin:0;font-size:18px}.meta{font-size:13px;color:#9ca3af}.price{font-size:24px;font-weight:700}.feat{font-size:13px;color:rgba(238,240,255,0.82);line-height:1.5}.btn{display:inline-flex;justify-content:center;align-items:center;padding:10px 12px;border-radius:10px;border:none;background:#6366f1;color:#fff;font-weight:600;cursor:pointer;text-decoration:none}.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.18);color:#dbe1ff}.pill{display:inline-flex;align-items:center;padding:4px 8px;border-radius:999px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;background:rgba(99,102,241,.18);border:1px solid rgba(99,102,241,.38);color:#c7d2fe}a{color:#b9b9ff;text-decoration:none}</style>
</head>
<body>
  <div class="wrap">
    <h1>Choose your CampX plan</h1>
    <p class="sub">Step 1 of 2: select a plan, then continue to billing for that exact plan.</p>
    <div id="campx-plan-selector" class="grid">
      <div class="plan"><h2>Loading plans...</h2><div class="meta">Fetching active plans from billing backend.</div></div>
    </div>
    <div class="box"><a href="/feed">Back to app</a></div>
  </div>
  <script type="module" src="/src/entries/user-tiers-live.ts"></script>
</body>
</html>
